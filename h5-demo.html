<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS — Desktop Enterprise Admin Panel
   ═══════════════════════════════════════════════════════════════ */
:root {
  --pri: #2563EB; --pri-l: #EFF6FF; --pri-d: #1D4ED8;
  --acc: #059669; --acc-l: #ECFDF5;
  --bg: #F8FAFC; --surf: #FFFFFF;
  --tx: #0F172A; --tx2: #64748B; --tx3: #94A3B8;
  --bd: #E2E8F0; --mu: #F1F5F9;
  --red: #DC2626; --red-l: #FEF2F2;
  --yel: #D97706; --yel-l: #FFFBEB;
  --r: 6px; --side: 240px;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font); font-size: 14px;
  background: var(--bg); color: var(--tx);
  line-height: 1.5; -webkit-font-smoothing: antialiased;
  display: flex; min-height: 100vh;
}

/* ── SIDEBAR ── */
.side {
  width: var(--side); background: var(--surf);
  border-right: 1px solid var(--bd);
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  display: flex; flex-direction: column; overflow-y: auto;
}
.side .logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px; border-bottom: 1px solid var(--bd);
}
.side .logo svg { width: 28px; height: 28px; flex-shrink: 0; }
.side .logo span { font-size: 16px; font-weight: 700; color: var(--pri); letter-spacing: -.3px; }
.side-nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
.side-nav .sec {
  font-size: 10px; font-weight: 700; color: var(--tx3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 20px 12px 6px;
}
.side-nav .sec:first-child { padding-top: 8px; }
.nav-i {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--r);
  font-size: 13px; font-weight: 500; color: var(--tx2);
  cursor: pointer; border: none; background: none;
  font-family: var(--font); width: 100%; text-align: left;
  transition: background .12s, color .12s;
}
.nav-i:hover { background: var(--mu); color: var(--tx); }
.nav-i.on { background: var(--pri-l); color: var(--pri); font-weight: 600; }
.nav-i svg { width: 18px; height: 18px; flex-shrink: 0; }
.nav-i .badge { margin-left: auto; min-width: 20px; height: 20px; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 6px; }
.side-foot { padding: 12px; border-top: 1px solid var(--bd); }
.role-sel {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--r);
  cursor: pointer; border: 1.5px solid var(--bd);
  background: var(--surf); font-family: var(--font);
  font-size: 13px; color: var(--tx2); width: 100%;
  transition: border-color .15s;
}
.role-sel:hover { border-color: var(--pri); }
.role-sel .rav { width: 30px; height: 30px; border-radius: 50%; background: var(--pri); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.role-sel .ri2 { flex: 1; min-width: 0; text-align: left; }
.role-sel .ri2 .rnm { font-weight: 600; color: var(--tx); font-size: 13px; }
.role-sel .ri2 .rtg { font-size: 11px; color: var(--tx3); }

/* ── MAIN AREA ── */
.main { margin-left: var(--side); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surf); border-bottom: 1px solid var(--bd);
  padding: 0 28px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar .bc { font-size: 13px; color: var(--tx3); }
.topbar .bc span { color: var(--tx); font-weight: 600; }
.content { flex: 1; padding: 28px; }

/* ── PAGE HEADER ── */
.ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.ph h1 { font-size: 22px; font-weight: 700; letter-spacing: -.4px; }
.ph .phr { display: flex; align-items: center; gap: 10px; }
.ph .subt { font-size: 13px; color: var(--tx3); margin-top: 2px; }

/* ── TABLE ── */
.tbl-wrap { background: var(--surf); border-radius: 8px; border: 1px solid var(--bd); overflow: hidden; }
.tbl-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--bd); gap: 12px; }
.tbl-src { display: flex; align-items: center; gap: 8px; background: var(--mu); border-radius: var(--r); padding: 7px 12px; border: 1.5px solid transparent; width: 280px; transition: border-color .15s, background .15s; }
.tbl-src:focus-within { border-color: var(--pri); background: var(--surf); }
.tbl-src svg { width: 15px; height: 15px; color: var(--tx3); flex-shrink: 0; }
.tbl-src input { flex: 1; border: none; background: none; outline: none; font-size: 13px; font-family: var(--font); color: var(--tx); }
.tbl-src input::placeholder { color: var(--tx3); }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 20px; font-size: 11px; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: .5px; background: var(--mu); border-bottom: 1px solid var(--bd); white-space: nowrap; }
tbody td { padding: 13px 20px; font-size: 13px; border-bottom: 1px solid var(--bd); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background .1s; cursor: pointer; }
tbody tr:hover { background: var(--mu); }
td .ct { font-weight: 600; color: var(--tx); }
td .ca { display: flex; gap: 6px; }

/* ── TAGS ── */
.tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
.tag.d { width: 7px; height: 7px; border-radius: 50%; padding: 0; }
.tag.b { background: var(--pri-l); color: var(--pri); }
.tag.g { background: var(--acc-l); color: var(--acc); }
.tag.r { background: var(--red-l); color: var(--red); }
.tag.y { background: var(--yel-l); color: var(--yel); }
.tag.gr { background: var(--mu); color: var(--tx3); }
.tag.bo { border: 1px solid var(--bd); color: var(--tx2); background: transparent; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 15px; border-radius: var(--r); font-size: 13px; font-weight: 600; font-family: var(--font); border: none; cursor: pointer; transition: background .15s, border-color .15s, color .15s; white-space: nowrap; }
.btn:hover { filter: brightness(.95); }
.btn-p { background: var(--pri); color: #fff; }
.btn-p:hover { background: var(--pri-d); filter: none; }
.btn-s { background: var(--acc); color: #fff; }
.btn-d { background: var(--red); color: #fff; }
.btn-o { background: var(--surf); color: var(--tx2); border: 1.5px solid var(--bd); }
.btn-o:hover { border-color: var(--pri); color: var(--pri); background: var(--pri-l); filter: none; }
.btn-gh { background: none; color: var(--tx2); }
.btn-gh:hover { background: var(--mu); filter: none; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-lg { padding: 9px 22px; font-size: 15px; }

/* ── FILTER TABS ── */
.ft { display: flex; gap: 2px; background: var(--mu); border-radius: var(--r); padding: 2px; }
.ft button { padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--tx2); font-family: var(--font); transition: all .15s; }
.ft button:hover { color: var(--tx); }
.ft button.sel { background: var(--surf); color: var(--pri); font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.06); }

/* ── CARDS ── */
.card { background: var(--surf); border-radius: 8px; border: 1px solid var(--bd); padding: 20px; }
.card-hd { font-size: 14px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; }

/* ── FORMS ── */
.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: var(--tx2); margin-bottom: 5px; }
.fg input, .fg select, .fg textarea { width: 100%; padding: 9px 12px; border-radius: var(--r); border: 1.5px solid var(--bd); font-size: 13px; font-family: var(--font); color: var(--tx); background: var(--surf); transition: border-color .15s; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--pri); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.fg textarea { resize: vertical; min-height: 70px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── DETAIL ── */
.d-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.dl { display: flex; padding: 9px 0; border-bottom: 1px solid var(--bd); }
.dl:last-child { border-bottom: none; }
.dl .lb { width: 90px; flex-shrink: 0; font-size: 12px; color: var(--tx3); font-weight: 500; }
.dl .vl { flex: 1; font-size: 13px; font-weight: 500; }
.mem-tbl { width: 100%; border-collapse: collapse; }
.mem-tbl th { text-align: left; padding: 7px 10px; font-size: 11px; font-weight: 600; color: var(--tx3); border-bottom: 1px solid var(--bd); }
.mem-tbl td { padding: 9px 10px; font-size: 13px; border-bottom: 1px solid var(--bd); }
.mem-tbl tr:last-child td { border-bottom: none; }
.mav { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; margin-right: 6px; vertical-align: middle; }

/* ── MODAL ── */
.mod { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 200; display: flex; align-items: center; justify-content: center; animation: fi .15s ease; }
@keyframes fi { from { opacity: 0; } to { opacity: 1; } }
.mod-p { background: var(--surf); border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,.15); width: 90%; max-width: 580px; max-height: 80vh; overflow-y: auto; animation: si .18s ease; }
@keyframes si { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
.mod-p.sm { max-width: 420px; }
.mod-h { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--bd); position: sticky; top: 0; background: var(--surf); z-index: 1; border-radius: 8px 8px 0 0; }
.mod-h h3 { font-size: 16px; font-weight: 700; }
.mod-b { padding: 20px; }
.mod-f { padding: 14px 20px; border-top: 1px solid var(--bd); display: flex; justify-content: flex-end; gap: 10px; }

/* ── STEPS ── */
.steps { display: flex; align-items: center; justify-content: center; gap: 0; padding: 20px 0 24px; }
.step { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--tx3); }
.step .no { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid var(--bd); background: var(--surf); color: var(--tx3); }
.step.on .no { border-color: var(--pri); background: var(--pri); color: #fff; }
.step.on { color: var(--pri); }
.step.ok .no { border-color: var(--acc); background: var(--acc); color: #fff; }
.step.ok { color: var(--acc); }
.step-d { width: 48px; height: 2px; background: var(--bd); margin: 0 12px; }
.step-d.ok { background: var(--acc); }

/* ── COMPARE ── */
.cmp { display: flex; border-bottom: 1px solid var(--bd); padding: 12px 0; align-items: flex-start; }
.cmp .fl { width: 90px; flex-shrink: 0; font-size: 12px; color: var(--tx3); font-weight: 500; padding-top: 8px; }
.cmp .fo { flex: 1; display: flex; gap: 12px; }
.cmp .opt { flex: 1; padding: 10px 14px; border-radius: var(--r); border: 1.5px solid var(--bd); cursor: pointer; font-size: 13px; transition: all .15s; }
.cmp .opt:hover { border-color: var(--pri); }
.cmp .opt.sel { border-color: var(--pri); background: var(--pri-l); }
.cmp .opt .rd { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--bd); display: inline-flex; align-items: center; justify-content: center; margin-right: 6px; vertical-align: middle; transition: all .15s; }
.cmp .opt.sel .rd { border-color: var(--pri); }
.cmp .opt.sel .rd::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--pri); display: block; }

/* ── TOAST ── */
.toast { position: fixed; top: 20px; right: 20px; padding: 10px 20px; border-radius: var(--r); font-size: 13px; font-weight: 600; color: #fff; z-index: 300; animation: ti .25s ease; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
@keyframes ti { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.toast.ok { background: var(--acc); }
.toast.err { background: var(--red); }
.toast.inf { background: var(--pri); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; color: var(--tx3); font-size: 13px; }

/* ── BANNER ── */
.ban { padding: 12px 16px; border-radius: var(--r); font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.ban.w { background: var(--yel-l); color: #92400E; border: 1px solid #FDE68A; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--pri); cursor: pointer; }

/* ── CHIP SELECTOR ── */
.chip-grp { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1.5px solid var(--bd); color: var(--tx2);
  background: var(--surf); transition: all .15s ease; user-select: none;
}
.chip:hover { border-color: var(--pri); color: var(--pri); }
.chip.sel { background: var(--pri-l); color: var(--pri); border-color: var(--pri); font-weight: 600; }
.chip.attr-sel { background: var(--acc-l); color: var(--acc); border-color: var(--acc); font-weight: 600; }
.chip .ch-x { margin-left: 4px; font-size: 13px; opacity: .5; }
.chip.sel .ch-x { opacity: .8; }
.chip.sel:hover .ch-x { opacity: 1; }

/* ── ROLE MGMT TABLE ── */
.role-edit-inline { padding: 5px 8px; border-radius: var(--r); border: 1.5px solid var(--pri); font-size: 13px; font-family: var(--font); width: 140px; }
.role-edit-inline:focus { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
</style>
</head>
<body>

<!-- ═══════════ SIDEBAR ═══════════ -->
<aside class="side" id="side">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <span>项目管理系统</span>
  </div>
  <nav class="side-nav" id="sideNav">
    <div class="sec">项目管理</div>
    <button class="nav-i on" data-pg="proj" onclick="navTo('proj')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      项目清单
    </button>
    <button class="nav-i" data-pg="merge" id="navMerge" onclick="navTo('merge')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      待合并清单
      <span class="badge" id="badgeMerge" style="display:none">3</span>
    </button>
    <div class="sec">审批</div>
    <button class="nav-i" data-pg="appr" id="navAppr" onclick="navTo('appr')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/></svg>
      项目审批
      <span class="badge" id="badgeAppr" style="display:none">3</span>
    </button>
    <div class="sec">系统管理</div>
    <button class="nav-i" data-pg="users" id="navUsers" onclick="navTo('users')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      用户与权限
    </button>
    <button class="nav-i" data-pg="logs" id="navLogs" onclick="navTo('logs')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      操作日志
    </button>
    <button class="nav-i" data-pg="roles" id="navRoles" onclick="navTo('roles')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      角色管理
    </button>
    <div class="sec">数据同步</div>
    <button class="nav-i" id="navSync" onclick="doSyncProjects()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      同步飞书项目
    </button>
    <button class="nav-i" id="navSyncP" onclick="doSyncPeople()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      同步人员信息
    </button>
    <button class="nav-i" id="navPush" onclick="doPushOutput()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      推送至外部系统
    </button>
  </nav>
  <div class="side-foot">
    <button class="role-sel" onclick="showRoleModal()" id="roleBtn">
      <div class="rav" id="roleAv">管</div>
      <div class="ri2"><div class="rnm" id="roleNm">系统管理员</div><div class="rtg">全部权限</div></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
</aside>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main">
  <header class="topbar">
    <div class="bc" id="bc">项目清单</div>
    <div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--tx2);">当前角色：<span class="tag b" id="topRoleTag">系统管理员</span></div>
  </header>
  <div class="content" id="content"></div>
</div>

<!-- ═══════════ ROLE MODAL ═══════════ -->
<div class="mod" id="roleModal" style="display:none" onclick="if(event.target===this)closeRoleModal()">
  <div class="mod-p sm"><div class="mod-h"><h3>切换角色</h3><button class="btn btn-gh btn-sm" onclick="closeRoleModal()">&times;</button></div>
    <div class="mod-b" style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-o" style="justify-content:flex-start;padding:12px;gap:12px;" onclick="switchRole('admin')">
        <span style="width:36px;height:36px;border-radius:50%;background:var(--pri-l);color:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;">管</span>
        <div style="text-align:left;"><div style="font-weight:600;">系统管理员</div><div style="font-size:11px;color:var(--tx3);">全部权限</div></div>
      </button>
      <button class="btn btn-o" style="justify-content:flex-start;padding:12px;gap:12px;" onclick="switchRole('pmo')">

function getMonths(start, end) {
  if (!start || !end) return [];
  const s = new Date(start + '-01');
  const e = new Date(end + '-01');
  const months = [];
  const cur = new Date(s);
  while (cur <= e) {
    const y = cur.getFullYear();
    const m = String(cur.getMonth() + 1).padStart(2, '0');
    months.push(y + '-' + m);
    cur.setMonth(cur.getMonth() + 1);
  }
  return months;
}

/* 成员表格渲染（详情/编辑共用） */
function renderMemberTable(p, editable) {
  const months = getMonths(p.start, p.end || p.start);

}

function editProj(pid) { const p = PROJ.find(x=>x.id===pid); if(!p||!canEdit()) return; selProj=p; startEdit(); }
function startEdit() {
  if(!selProj) return; editData=JSON.parse(JSON.stringify(selProj)); tmpMems=JSON.parse(JSON.stringify(selProj.members));
  const p=selProj;
  document.getElementById('dv').style.display='none';
  document.getElementById('de').style.display='';
  document.getElementById('de').innerHTML=`
    <div class="d-row"><div class="card"><div class="card-hd">编辑基本信息（REQ-PM-002）</div>
      <div class="f-row"><div class="fg"><label>项目名称</label><input type="text" id="en" value="${p.name}"></div><div class="fg"><label>项目编号</label><input type="text" id="eno" value="${p.no}"></div></div>
      <div class="f-row"><div class="fg"><label>项目类型</label><select id="et"><option value="external" ${p.type==='external'?'selected':''}>外部项目</option><option value="internal" ${p.type==='internal'?'selected':''}>内部项目</option></select></div><div class="fg"><label>所属产品</label><select id="ep"><option ${p.product==='产品A'?'selected':''}>产品A</option><option ${p.product==='产品B'?'selected':''}>产品B</option><option ${p.product==='产品C'?'selected':''}>产品C</option></select></div></div>
      <div class="f-row"><div class="fg"><label>负责人</label><select id="eld">${PPL.map(x=>`<option value="${x.id}" ${p.leader===x.id?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="fg"><label>开始日期</label><input type="date" id="es" value="${p.start}" onchange="editData.start=this.value; document.getElementById('tmpTbl').innerHTML=renderTmpMems();"></div></div>
      <div class="f-row"><div class="fg"><label>结束日期</label><input type="date" id="ee" value="${p.end}" onchange="editData.end=this.value; document.getElementById('tmpTbl').innerHTML=renderTmpMems();"></div></div>
      <div class="fg"><label>项目描述</label><textarea id="ed">${p.desc}</textarea></div>
      </div>
      <div class="card"><div class="card-hd">编辑项目成员（REQ-PM-003）<button class="btn btn-o btn-sm" onclick="showMemModal()">+ 编辑成员</button></div>
        <p style="font-size:12px;color:var(--tx2);margin-bottom:12px;">项目周期：${p.start||'—'} ~ ${p.end||'—'}，下方月份列随起止时间自动调整。</p>
        <div id="tmpTbl">${renderTmpMems()}</div></div></div>
    ${p.status==='active'?`<div class="card" style="margin-top:20px;"><div class="card-hd">项目状态变更（REQ-PM-004）</div>
      <p style="font-size:12px;color:var(--tx2);margin-bottom:12px;">当前状态：<span class="tag g">进行中</span>。调整状态将触发 PMO 审批流程。</p>
      <p style="font-size:11px;color:var(--yel);margin-bottom:12px;padding:8px 12px;background:var(--yel-l);border-radius:var(--r);">⚠ 状态变更与字段编辑解耦：审批失败不影响其他字段修改结果，仅状态退回原值。</p>
      <div class="fg"><label>变更为目标状态</label><select id="e-status" onchange="const w=document.getElementById('e-status-reason-wrap');if(w)w.style.display=this.value?'':'none';"><option value="" selected>不变更</option><option value="completed">已完成 — 项目正常完成</option><option value="suspended">挂起 — 暂时中止</option><option value="cancelled">已作废 — 项目作废</option></select></div>
      <div class="fg" id="e-status-reason-wrap" style="display:none;"><label>变更原因</label><textarea id="e-status-reason" placeholder="请说明状态变更原因..."></textarea></div>
    </div>`:''}
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn btn-p btn-lg" onclick="saveEdit()">保存全部修改</button>
      <button class="btn btn-gh btn-lg" onclick="openDet(selProj.id)">取消编辑</button>
    </div>`;
}
function renderTmpMems() {
  const p = selProj || editData;
  return renderMemberTable({ ...p, members: tmpMems }, true);
}
function removeTmpMem(i) { tmpMems.splice(i,1); document.getElementById('tmpTbl').innerHTML=renderTmpMems(); }
function syncMemHours() {
  // 项目周期变化后，对齐成员工时对象的月份键并重新计算总计
  const months = getMonths(editData.start, editData.end || editData.start);
  tmpMems.forEach(m => {
    const nh = {};
    months.forEach(mon => { nh[mon] = m.hours?.[mon] || 0; });
    m.hours = nh;
    m.total = Object.values(nh).reduce((a, b) => a + b, 0);
  });
}

function saveEdit() {
  if(!editData) return;
  editData.name=document.getElementById('en').value; editData.no=document.getElementById('eno').value;
  editData.type=document.getElementById('et').value; editData.product=document.getElementById('ep').value;
  editData.leader=document.getElementById('eld').value; editData.start=document.getElementById('es').value;
  editData.end=document.getElementById('ee').value; editData.desc=document.getElementById('ed').value;
  syncMemHours();
  editData.members=tmpMems;
  const idx=PROJ.findIndex(p=>p.id===editData.id); if(idx>=0) PROJ[idx]=editData;
  selProj=editData;
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'当前用户',a:'修改项目',g:editData.name,d:'更新基本信息和成员'});
  // 检查是否有状态变更（REQ-PM-004：状态编辑与字段编辑解耦）
  const ns=document.getElementById('e-status');
  if(ns&&ns.value){
    const lb={completed:'已完成',suspended:'挂起',cancelled:'已作废'};
    const reason=document.getElementById('e-status-reason')?.value||'用户发起状态变更申请。';
    APPR.unshift({id:'a'+Date.now(),pid:editData.id,pn:editData.name,from:'进行中',to:lb[ns.value],who:'当前用户',dt:new Date().toISOString().split('T')[0],st:'pending',reason:reason});
    LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'当前用户',a:'发起审批',g:editData.name,d:`状态变更申请：进行中 → ${lb[ns.value]}`});
    updateBadges();
    toast('项目信息已保存；状态变更申请已提交，等待PMO审核','inf');
  } else {
    toast('项目信息已保存','ok');
  }
  openDet(editData.id);
}

/* ═══════════════════════════════════════
   CHIP SELECTOR HELPERS
   ═══════════════════════════════════════ */
function toggleChip(el, multi) {
  if (multi) {
    el.classList.toggle('sel');
  } else {
    el.closest('.chip-grp').querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
  }
}
function readChips(group, multi) {
  if (!group) return multi ? [] : '';
  if (multi) return Array.from(group.querySelectorAll('.chip.sel')).map(c => c.dataset.value);
  const sel = group.querySelector('.chip.sel');
  return sel ? sel.dataset.value : (multi ? [] : '');
}

/* ═══════════════════════════════════════
   MEMBER MODAL — REQ-PM-003
   表格列：序号 / 姓名 / 角色 / 人员属性 / 月份（按项目周期） / 工时总计
   ═══════════════════════════════════════ */
function showMemModal() {
  const p = selProj || editData;
  const months = getMonths(p?.start, p?.end || p?.start);
  const m = document.createElement('div'); m.className='mod'; m.style.display='flex';
  m.onclick = function(e){ if(e.target===this) this.remove(); };

  const rows = tmpMems.map((mem, i) => {
    const pp = PPL.find(x => x.id === mem.pid);
    const total = months.reduce((s, mon) => s + (parseFloat(mem.hours?.[mon]) || 0), 0);
    return `<tr data-idx="${i}">
      <td style="text-align:center;">${i + 1}</td>
      <td><span class="mav" style="background:${pp?.av||'#2563EB'}">${(pp?.name||'?')[0]}</span>${pp?.name||'—'}</td>
      <td><div class="chip-grp" data-name="roles" data-multi="1" style="min-width:140px;">${ROLES.map(r=>{const isSel=(mem.roles||[]).includes(r);return`<span class="chip${isSel?' sel':''}" data-value="${r}" onclick="toggleChip(this,1)">${r}${isSel?'<span class="ch-x">×</span>':''}</span>`;}).join('')}</div></td>
      <td><div class="chip-grp" data-name="attr" data-multi="0">${ATTRS.map(a=>`<span class="chip${mem.attr===a?' sel attr-sel':''}" data-value="${a}" onclick="toggleChip(this,0)">${a}</span>`).join('')}</div></td>
      ${months.map(mon=>`<td style="text-align:center;"><input type="number" class="m-hour" data-mon="${mon}" value="${mem.hours?.[mon] || ''}" min="0" step="1" style="width:58px;text-align:center;padding:6px 4px;font-size:12px;" oninput="calcMemTotal(this)"></td>`).join('')}
      <td class="m-total" style="text-align:center;font-weight:600;">${total}</td>
      <td><button class="btn btn-gh btn-sm" style="color:var(--red);" onclick="removeTmpMem(${i}); this.closest('.mod').remove(); showMemModal();">移除</button></td>
    </tr>`;
  }).join('');

  const emptyRow = !tmpMems.length ? `<tr><td colspan="${4 + months.length + 2}" style="text-align:center;color:var(--tx3);padding:40px;">暂无成员，请点击右上角添加</td></tr>` : '';

  m.innerHTML = `<div class="mod-p" style="max-width:95vw;width:1000px;">
    <div class="mod-h"><h3>编辑项目成员（REQ-PM-003）</h3><button class="btn btn-gh btn-sm" onclick="this.closest('.mod').remove()">&times;</button></div>
    <div class="mod-b">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <p style="font-size:12px;color:var(--tx2);">项目周期：<b>${p?.start||'—'} ~ ${p?.end||'—'}</b>，月份列随起止时间自动调整；工时总计实时汇总。</p>
        <button class="btn btn-o btn-sm" onclick="showAddMemPicker()">+ 添加成员</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="mem-tbl" style="min-width:${500 + months.length * 72}px;">
          <thead><tr><th style="width:40px;text-align:center;">序号</th><th>姓名</th><th style="min-width:120px;">角色</th><th style="width:90px;">人员属性</th>${months.map(mon=>`<th style="min-width:72px;text-align:center;">${mon}</th>`).join('')}<th style="width:80px;text-align:center;">工时总计</th><th style="width:60px;">操作</th></tr></thead>
          <tbody>${rows}${emptyRow}</tbody>
        </table>
      </div>
    </div>
    <div class="mod-f"><button class="btn btn-gh" onclick="this.closest('.mod').remove()">取消</button><button class="btn btn-p" onclick="saveMems(this)">确认</button></div>
  </div>`;
  document.body.appendChild(m);
}

function showAddMemPicker() {
  const avail = PPL.filter(x => !tmpMems.some(m => m.pid === x.id));
  if (!avail.length) { toast('暂无可添加人员','err'); return; }
  const m = document.createElement('div'); m.className='mod'; m.style.display='flex';
  m.onclick = function(e){ if(e.target===this) this.remove(); };
  m.innerHTML = `<div class="mod-p sm"><div class="mod-h"><h3>添加成员</h3><button class="btn btn-gh btn-sm" onclick="this.closest('.mod').remove()">&times;</button></div><div class="mod-b">${avail.map(x=>`<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer;"><input type="checkbox" data-pid="${x.id}"><span class="mav" style="background:${x.av}">${x.name[0]}</span><span style="flex:1;font-weight:500;">${x.name}</span><span style="font-size:12px;color:var(--tx3);">${x.dept}</span></label>`).join('')}</div><div class="mod-f"><button class="btn btn-gh" onclick="this.closest('.mod').remove()">取消</button><button class="btn btn-p" onclick="confirmAddMems(this)">确认添加</button></div></div>`;
  document.body.appendChild(m);
}

function confirmAddMems(btn) {
  const checked = btn.closest('.mod').querySelectorAll('input[type="checkbox"]:checked');
  checked.forEach(cb => {
    tmpMems.push({ pid: cb.dataset.pid, roles: ['成员'], attr: '国智', hours: {}, total: 0 });
  });
  btn.closest('.mod').remove();
  // 刷新成员编辑弹窗
  document.querySelectorAll('.mod').forEach(x => x.remove());
  showMemModal();
}

function calcMemTotal(inp) {
  const tr = inp.closest('tr');
  let total = 0;
  tr.querySelectorAll('.m-hour').forEach(i => total += parseFloat(i.value) || 0);
  tr.querySelector('.m-total').textContent = total;
}

function saveMems(btn) {
  const rows = btn.closest('.mod').querySelectorAll('tbody tr[data-idx]');
  rows.forEach(row => {
    const idx = parseInt(row.dataset.idx);
    const roleGrp = row.querySelector('.chip-grp[data-name="roles"]');
    const roles = readChips(roleGrp, true);
    const attrGrp = row.querySelector('.chip-grp[data-name="attr"]');
    const attr = readChips(attrGrp, false) || '国智';
    const hours = {}; let total = 0;
    row.querySelectorAll('.m-hour').forEach(inp => {
      const v = parseFloat(inp.value) || 0;
      hours[inp.dataset.mon] = v;
      total += v;
    });
    tmpMems[idx] = { ...tmpMems[idx], roles: roles.length ? roles : ['成员'], attr, hours, total };
  });
  btn.closest('.mod').remove();
  document.getElementById('tmpTbl').innerHTML = renderTmpMems();
  toast(`已更新成员（${tmpMems.length}人）`,'ok');
}

function renderMerge() {
  document.getElementById('content').innerHTML = `
    <div class="ph"><div><h1>待合并项目清单</h1><p class="subt">飞书同步项目的暂存区，仅管理员/PMO可操作（REQ-DS-002）</p></div><button class="btn btn-p" onclick="showCreateModal()">+ 手动创建项目</button></div>
    <div class="ban w"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>此清单仅系统管理员可操作，不对外展示。需清洗合并后进入正式项目清单。</div>
    <div class="tbl-wrap">${MERGE.length===0?'<div class="empty">暂无待合并项目</div>':`<table><thead><tr><th>类型</th><th>编号</th><th>名称</th><th>来源</th><th>同步时间</th><th>操作</th></tr></thead><tbody>${MERGE.map(m=>{const tagClass=m.type==='setup'?'b':m.type==='close'?'r':'gr';const tagText=m.type==='setup'?'立项':m.type==='close'?'结项':'手动创建';return`<tr><td><span class="tag ${tagClass}">${tagText}</span></td><td>${m.no}</td><td><span class="ct">${m.f.name}</span></td><td>${m.src}</td><td style="font-size:12px;color:var(--tx2);">${m.dt}</td><td class="ca"><button class="btn btn-p btn-sm" onclick="startMerge('${m.id}')">合并项目信息</button>${m.type!=='close'?`<button class="btn btn-o btn-sm" onclick="quickNew('${m.id}')">新建合并项目</button>`:''}</td></tr>`}).join('')}</tbody></table>`}</div>`;
  page='merge';
}

function showCreateModal() {

function doCreate(btn) {

function quickNew(mid) {
  const mi=MERGE.find(m=>m.id===mid); if(!mi) return;
  PROJ.push({id:'p'+Date.now(),no:mi.f.no,name:mi.f.name,type:mi.f.type,product:mi.f.product,leader:mi.f.leader,status:'active',start:new Date().toISOString().split('T')[0],end:'',desc:mi.f.desc||'',members:[]});

}

/* ═══════════════════════════════════════
   MERGE PROCESS — REQ-PM-006, PM-007
   ═══════════════════════════════════════ */
function startMerge(mid) {
  selMerge=MERGE.find(m=>m.id===mid); if(!selMerge) return;
  mergeStep=selMerge.type==='close'?0:1;
  page='merge';
  document.getElementById('bc').innerHTML=`待合并项目清单 &rsaquo; <span>合并项目信息</span>`;
  renderMergeStep();
}
function renderMergeStep() {
  const mi=selMerge; const ct=document.getElementById('content');
  const isClose=mi.type==='close';
  const stepHTML=()=>{
    if(isClose){
      const c=n=>mergeStep===n?'on':mergeStep>n?'ok':'';
      return`<div class="steps"><div class="step ${c(0)}"><span class="no">${mergeStep>0?'✓':'1'}</span>编辑结项信息</div><div class="step-d ${mergeStep>0?'ok':''}"></div><div class="step ${c(1)}"><span class="no">${mergeStep>1?'✓':'2'}</span>冲突检测</div><div class="step-d ${mergeStep>1?'ok':''}"></div><div class="step ${c(2)}"><span class="no">${mergeStep>2?'✓':'3'}</span>字段比对</div><div class="step-d ${mergeStep>2?'ok':''}"></div><div class="step ${c(3)}"><span class="no">4</span>确认合并</div></div>`;
    }
    const c=n=>mergeStep===n?'on':mergeStep>n?'ok':'';
    return`<div class="steps"><div class="step ${c(1)}"><span class="no">${mergeStep>1?'✓':'1'}</span>冲突检测</div><div class="step-d ${mergeStep>1?'ok':''}"></div><div class="step ${c(2)}"><span class="no">${mergeStep>2?'✓':'2'}</span>字段比对</div><div class="step-d ${mergeStep>2?'ok':''}"></div><div class="step ${c(3)}"><span class="no">3</span>确认合并</div></div>`;
  };
  if(mergeStep===0) {
    ct.innerHTML=stepHTML()+`<div class="card" style="margin-bottom:20px;"><h3 style="margin-bottom:16px;">编辑结项信息（REQ-PM-007）</h3><p style="font-size:12px;color:var(--tx2);margin-bottom:16px;">请核对并修改结项信息，确认后进入冲突检测步骤。结项合并不支持跳过项目选择。</p>
    <div class="f-row"><div class="fg"><label>项目名称</label><input type="text" id="ce-name" value="${mi.f.name||''}"></div><div class="fg"><label>项目编号</label><input type="text" id="ce-no" value="${mi.f.no||''}"></div></div>
    <div class="f-row"><div class="fg"><label>结项日期 *</label><input type="date" id="ce-closeDate" value="${mi.f.closeDate||''}"></div><div class="fg"><label>结项原因 *</label><input type="text" id="ce-closeReason" value="${mi.f.closeReason||''}"></div></div>
    <div class="fg"><label>项目描述</label><textarea id="ce-desc">${mi.f.desc||''}</textarea></div>
    <div style="text-align:right;margin-top:16px;"><button class="btn btn-p btn-lg" onclick="saveCloseInfo()">下一步 &rarr;</button></div></div>`;
    return;
  }
  if(mergeStep===1) {
    const cf=PROJ.filter(p=>p.no===mi.f.no||p.name.includes(mi.f.name.substring(0,4))||mi.f.name.includes(p.name.substring(0,4)));
    const srcTxt=mi.type==='setup'?'飞书立项流程':mi.type==='close'?'飞书结项流程':'手动创建';
    const tagCls=mi.type==='setup'?'b':mi.type==='close'?'r':'gr';
    const tagTx=mi.type==='setup'?'立项':mi.type==='close'?'结项':'手动创建';
    ct.innerHTML=stepHTML()+`<div class="card" style="margin-bottom:20px;background:var(--pri-l);border-color:var(--pri);"><div style="font-size:12px;color:var(--tx2);">待合并项目（${srcTxt}）</div><div style="font-weight:700;font-size:16px;margin:4px 0;">${mi.f.name}</div><div>${mi.f.no} · <span class="tag ${tagCls}">${tagTx}</span></div></div><h3 style="margin-bottom:12px;">${cf.length?'疑似冲突项目（REQ-PM-006/007 — 按编号、名称关键词匹配）':'选择目标项目'}</h3><div class="tbl-wrap"><table><thead><tr><th>编号</th><th>名称</th><th>产品</th><th>状态</th><th>操作</th></tr></thead><tbody>${(cf.length?cf:PROJ).map(c=>`<tr><td>${c.no}</td><td><span class="ct">${c.name}</span></td><td>${c.product}</td><td><span class="tag gr">${{active:'进行中',completed:'已完成',suspended:'挂起',cancelled:'已作废',closed:'已结项'}[c.status]}</span></td><td><button class="btn btn-p btn-sm" onclick="selConflict('${c.id}')">选择此项目</button></td></tr>`).join('')}</tbody></table></div>${mi.type!=='close'?'<div style="margin-top:16px;"><button class="btn btn-o" onclick="mergeAsNew()">+ 新建合并项目（跳过字段比对）</button></div>':''}`;
  }
  if(mergeStep===2) {
    const tgt=PROJ.find(p=>p.id===mi._cid);
    const fields=[{k:'name',l:'项目名称'},{k:'no',l:'项目编号'},{k:'type',l:'项目类型'},{k:'product',l:'所属产品'},{k:'leader',l:'项目负责人'},{k:'desc',l:'项目描述'}];
    if(mi.type==='close') fields.push({k:'closeDate',l:'结项日期'},{k:'closeReason',l:'结项原因'});
    if(!mi._choices){mi._choices={};fields.forEach(f=>mi._choices[f.k]='merge');}
    ct.innerHTML=stepHTML()+`<p style="margin-bottom:16px;color:var(--tx2);">逐字段比对，点击选择保留的数据来源。（REQ-PM-${mi.type==='close'?'007':'006'}：结项比对立项多「结项日期」「结项原因」字段）</p><div class="card" style="padding:0;">${fields.map(f=>{const mv=mi.f[f.k]===undefined?'—':String(mi.f[f.k]);const tv=(tgt&&tgt[f.k]!==undefined?String(tgt[f.k]):'—');let md=mv,td=tv;if(f.k==='type'){md=mv==='external'?'外部项目':'内部项目';td=tv==='external'?'外部项目':'内部项目';}if(f.k==='leader'){md=PPL.find(x=>x.id===mv)?.name||mv;td=PPL.find(x=>x.id===tv)?.name||tv;}return`<div class="cmp"><span class="fl">${f.l}</span><div class="fo"><div class="opt sel" onclick="selOpt(this,'${f.k}','merge')"><span class="rd"></span>${md}</div><div class="opt" onclick="selOpt(this,'${f.k}','target')"><span class="rd"></span>${td}</div></div></div>`;}).join('')}</div><div style="margin-top:20px;text-align:right;"><button class="btn btn-p btn-lg" onclick="goStep(3)">下一步 &rarr;</button></div>`;
  }
  if(mergeStep===3) {
    const tgt=PROJ.find(p=>p.id===mi._cid);
    ct.innerHTML=stepHTML()+`<div class="card" style="text-align:center;padding:40px;"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--acc)" stroke-width="2" style="margin-bottom:16px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><h2 style="margin-bottom:8px;">确认合并</h2><p style="color:var(--tx2);">合并至：<b>${tgt?.name||'新建项目'}</b></p><p style="color:var(--tx2);margin-bottom:20px;">合并后状态：<b>${mi.type==='close'?'已结项':'进行中'}</b></p><div style="display:flex;gap:10px;justify-content:center;"><button class="btn btn-s btn-lg" onclick="doMerge()">确认合并</button><button class="btn btn-gh" onclick="goStep(2)">返回修改</button></div></div>`;
  }
}
function selConflict(cid){selMerge._cid=cid;mergeStep=2;renderMergeStep();}
function mergeAsNew(){selMerge._cid=null;mergeStep=3;renderMergeStep();}
function goStep(s){mergeStep=s;renderMergeStep();}
function saveCloseInfo(){
  const mi=selMerge;
  const cd=document.getElementById('ce-closeDate').value;
  const cr=document.getElementById('ce-closeReason').value;
  if(!cd){toast('请填写结项日期','err');return;}
  if(!cr){toast('请填写结项原因','err');return;}
  mi.f.name=document.getElementById('ce-name').value;
  mi.f.no=document.getElementById('ce-no').value;
  mi.f.closeDate=cd; mi.f.closeReason=cr;
  mi.f.desc=document.getElementById('ce-desc').value;
  mergeStep=1; renderMergeStep();
}
function selOpt(el,k,src){el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');selMerge._choices[k]=src;}
function doMerge(){
  const mi=selMerge; const tgt=mi._cid?PROJ.find(p=>p.id===mi._cid):null;
  if(tgt){Object.keys(mi._choices||{}).forEach(k=>{if(k==='closeDate'||k==='closeReason')return;if(mi._choices[k]==='merge'&&mi.f[k]!==undefined)tgt[k]=mi.f[k];});tgt.status=mi.type==='close'?'closed':'active';}
  else{PROJ.push({id:'p'+Date.now(),no:mi.f.no,name:mi.f.name,type:mi.f.type,product:mi.f.product,leader:mi.f.leader,status:'active',start:new Date().toISOString().split('T')[0],end:'',desc:mi.f.desc||'',members:[]});}
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'系统管理员',a:'合并项目',g:mi.f.name,d:`${mi.type==='close'?'结项':mi.type==='manual'?'手动创建':'立项'}合并至项目清单`});
  MERGE.splice(MERGE.indexOf(mi),1); toast('项目合并完成！','ok'); updateBadges(); renderMerge();
}

/* ═══════════════════════════════════════
   APPROVAL — REQ-PA-001
   ═══════════════════════════════════════ */
function renderAppr() {
  const pending=APPR.filter(a=>a.st==='pending'); const done=APPR.filter(a=>a.st!=='pending');
  document.getElementById('content').innerHTML=`
    <div class="ph"><div><h1>项目审批</h1><p class="subt">审核项目状态变更请求，仅PMO/管理员可操作（REQ-PA-001）</p></div></div>
    <h3 style="margin-bottom:12px;">待审批（${pending.length}）</h3>
    <div class="tbl-wrap" style="margin-bottom:28px;">${pending.length===0?'<div class="empty">暂无待审批</div>':`<table><thead><tr><th>项目</th><th>变更</th><th>发起人</th><th>日期</th><th>原因</th><th>操作</th></tr></thead><tbody>${pending.map(a=>`<tr><td><span class="ct">${a.pn}</span></td><td>${a.from} &rarr; <span style="color:var(--pri);font-weight:600;">${a.to}</span></td><td>${a.who}</td><td style="font-size:12px;">${a.dt}</td><td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;">${a.reason}</td><td class="ca"><button class="btn btn-s btn-sm" onclick="doAppr('${a.id}','approved')">通过</button><button class="btn btn-d btn-sm" onclick="doAppr('${a.id}','rejected')">拒绝</button></td></tr>`).join('')}</tbody></table>`}</div>
    <h3 style="margin-bottom:12px;">已处理</h3>
    <div class="tbl-wrap">${done.length===0?'<div class="empty">暂无已处理</div>':`<table><thead><tr><th>项目</th><th>变更</th><th>发起人</th><th>结果</th><th>审批人</th><th>日期</th><th>备注</th></tr></thead><tbody>${done.map(a=>`<tr><td><span class="ct">${a.pn}</span></td><td>${a.from} &rarr; ${a.to}</td><td>${a.who}</td><td><span class="tag ${a.st==='approved'?'g':'r'}">${a.result}</span></td><td>${a.rv||'—'}</td><td style="font-size:12px;">${a.rd||''}</td><td style="font-size:11px;color:var(--tx3);max-width:180px;">${a.st==='rejected'?(a.rr||'—'):'—'}</td></tr>`).join('')}</tbody></table>`}</div>`;
  page='appr';
}
function doAppr(aid,result){
  if(!canAppr())return;
  if(result==='rejected'){showRejectModal(aid);return;}
  const a=APPR.find(x=>x.id===aid);if(!a)return;
  a.st='approved';a.result='通过';a.rv='当前用户（PMO）';a.rd=new Date().toISOString().split('T')[0];
  const p=PROJ.find(x=>x.id===a.pid);if(p){const m={'已完成':'completed','挂起':'suspended','已作废':'cancelled'};p.status=m[a.to]||p.status;}
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'PMO',a:'审批通过',g:a.pn,d:`状态变更生效：${a.from} → ${a.to}`});
  updateBadges();renderAppr();toast('审批通过 ✓，项目状态已调整','ok');
}
function showRejectModal(aid){
  const a=APPR.find(x=>x.id===aid);if(!a)return;
  const m=document.createElement('div');m.className='mod';m.style.display='flex';
  m.onclick=function(e){if(e.target===this)this.remove();};
  m.innerHTML=`<div class="mod-p sm"><div class="mod-h"><h3>审批拒绝（REQ-PA-001）</h3><button class="btn btn-gh btn-sm" onclick="this.closest('.mod').remove()">&times;</button></div><div class="mod-b"><p style="margin-bottom:14px;">项目：<b>${a.pn}</b><br>变更申请：${a.from} &rarr; ${a.to}</p><div class="ban w" style="margin-bottom:14px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>拒绝后：项目状态退回原值（${a.from}），其他字段修改不受影响。</div><div class="fg"><label>拒绝原因 *</label><textarea id="reject-reason" placeholder="请说明拒绝原因..." style="min-height:60px;"></textarea></div></div><div class="mod-f"><button class="btn btn-gh" onclick="this.closest('.mod').remove()">取消</button><button class="btn btn-d" onclick="confirmReject('${aid}')">确认拒绝</button></div></div>`;
  document.body.appendChild(m);
}
function confirmReject(aid){
  const reason=document.getElementById('reject-reason').value.trim();
  if(!reason){toast('请填写拒绝原因','err');return;}
  const a=APPR.find(x=>x.id===aid);if(!a)return;
  a.st='rejected';a.result='拒绝';a.rv='当前用户（PMO）';a.rd=new Date().toISOString().split('T')[0];a.rr=reason;
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'PMO',a:'审批拒绝',g:a.pn,d:`状态变更被拒绝（${a.from}→${a.to}），项目状态保持${a.from}。原因：${reason}`});
  document.querySelectorAll('.mod').forEach(m=>m.remove());updateBadges();renderAppr();
  toast('状态变更已拒绝，项目状态退回原值，其他信息修改不受影响','err');
}

/* ═══════════════════════════════════════
   ROLE MANAGEMENT — 系统管理员维护角色表
   ═══════════════════════════════════════ */
function renderRoles() {
  document.getElementById('content').innerHTML = `
    <div class="ph"><div><h1>角色管理</h1><p class="subt">维护成员角色表，修改将实时生效至项目成员编辑。</p></div></div>
    <div class="tbl-wrap">
      <div class="tbl-bar">
        <div style="display:flex;align-items:center;gap:8px;flex:1;">
          <input type="text" id="newRoleInput" placeholder="输入新角色名称..." style="padding:7px 12px;border-radius:var(--r);border:1.5px solid var(--bd);font-size:13px;font-family:var(--font);width:200px;" onkeydown="if(event.key==='Enter')addRole()">
          <button class="btn btn-p btn-sm" onclick="addRole()">+ 添加</button>
        </div>
        <span style="font-size:12px;color:var(--tx3);">共 ${ROLES.length} 个角色</span>
      </div>
      <div id="roleTbBody">${renderRoleTable()}</div>
    </div>`;
  page='roles';
}
function renderRoleTable() {
  if (!ROLES.length) return '<div class="empty">暂无角色，请添加</div>';
  return `<table><thead><tr><th style="width:50px;">序号</th><th>角色名称</th><th style="width:150px;">操作</th></tr></thead><tbody>${ROLES.map((r,i)=>`<tr id="role-row-${i}"><td>${i+1}</td><td id="role-cell-${i}"><span class="ct" id="role-name-${i}">${r}</span><input type="text" class="role-edit-inline" id="role-edit-${i}" value="${r}" style="display:none;" onkeydown="if(event.key==='Enter')saveRoleEdit(${i})"></td><td class="ca"><button class="btn btn-o btn-sm" id="role-btn-edit-${i}" onclick="startRoleEdit(${i})">✎ 编辑</button><button class="btn btn-p btn-sm" id="role-btn-save-${i}" style="display:none;" onclick="saveRoleEdit(${i})">保存</button><button class="btn btn-gh btn-sm" style="color:var(--red);" onclick="delRole(${i})">删除</button></td></tr>`).join('')}</tbody></table>`;
}
function addRole() {
  const inp = document.getElementById('newRoleInput'); const v = inp.value.trim();
  if (!v) { toast('请输入角色名称','err'); return; }
  if (ROLES.includes(v)) { toast('角色已存在','err'); return; }
  ROLES.push(v); inp.value = '';
  document.getElementById('roleTbBody').innerHTML = renderRoleTable();
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'管理员',a:'角色管理',g:'角色表',d:`添加角色「${v}」`});
  toast(`已添加角色「${v}」`,'ok');
}
function startRoleEdit(i) {
  document.getElementById('role-name-'+i).style.display='none';
  document.getElementById('role-edit-'+i).style.display='';
  document.getElementById('role-edit-'+i).focus();
  document.getElementById('role-btn-edit-'+i).style.display='none';
  document.getElementById('role-btn-save-'+i).style.display='';
}
function saveRoleEdit(i) {
  const v = document.getElementById('role-edit-'+i).value.trim();
  if (!v) { toast('角色名称不能为空','err'); return; }
  const old = ROLES[i];
  if (v !== old && ROLES.includes(v)) { toast('角色已存在','err'); return; }
  ROLES[i] = v;
  document.getElementById('roleTbBody').innerHTML = renderRoleTable();
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'管理员',a:'角色管理',g:'角色表',d:v!==old?`重命名「${old}」→「${v}」`:`保存「${v}」`});
  toast(v!==old?`已重命名为「${v}」`:'保存成功','ok');
}
function delRole(i) {
  const r = ROLES[i];
  if (!confirm(`确定删除角色「${r}」？删除后所有项目中该角色信息将失效。`)) return;
  ROLES.splice(i, 1);
  document.getElementById('roleTbBody').innerHTML = renderRoleTable();
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'管理员',a:'角色管理',g:'角色表',d:`删除角色「${r}」`});
  toast(`已删除角色「${r}」`,'ok');
}

/* ═══════════════════════════════════════
   USER MANAGEMENT — REQ-SM-001, SM-002
   ═══════════════════════════════════════ */
function renderUsers() {
  userSel={};
  document.getElementById('content').innerHTML=`<div class="ph"><div><h1>用户与权限管理</h1><p class="subt">管理用户信息与角色权限（REQ-SM-001 / REQ-SM-002）</p></div><button class="btn btn-p" onclick="showBatchPerm()">批量调整角色</button></div><div class="tbl-wrap"><div class="tbl-bar"><div class="tbl-src"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="按姓名、角色搜索..." oninput="filterUsers(this.value)"></div><span style="font-size:12px;color:var(--tx3);">勾选用户后可批量调整角色</span></div><table><thead><tr><th style="width:40px;"><input type="checkbox" onchange="toggleAll(this)"></th><th>姓名</th><th>部门</th><th>当前角色</th><th>权限说明</th></tr></thead><tbody id="userTb"></tbody></table></div>`;
  renderUserTb(); page='users';
}
function renderUserTb(f='') {
  let list=[...USER_DATA];if(f){const q=f.toLowerCase();list=list.filter(u=>{const p=PPL.find(x=>x.id===u.pid);return(p?.name||'').toLowerCase().includes(q)||u.rl.toLowerCase().includes(q);});}
  const tc={admin:'b',pmo:'g',lead:'y',user:'gr'};const perm={admin:'全部权限',pmo:'审批+待合并操作',lead:'查看+编辑项目',user:'仅查看项目'};
  document.getElementById('userTb').innerHTML=list.map(u=>{const p=PPL.find(x=>x.id===u.pid);return`<tr><td><input type="checkbox" data-uid="${u.id}" onchange="toggleUSel('${u.id}',this)"></td><td><span class="mav" style="background:${p?.av||'#2563EB'}">${(p?.name||'?')[0]}</span>${p?.name||'—'}</td><td style="font-size:12px;color:var(--tx2);">${p?.dept||'—'}</td><td><span class="tag ${tc[u.role]||'gr'}">${u.rl}</span></td><td style="font-size:12px;color:var(--tx3);">${perm[u.role]}</td></tr>`;}).join('');
}
function toggleAll(c){document.querySelectorAll('#userTb input[type="checkbox"]').forEach(ch=>{ch.checked=c.checked;userSel[ch.dataset.uid]=c.checked;});}
function toggleUSel(uid,cb){userSel[uid]=cb.checked;}
function filterUsers(v){renderUserTb(v);}
function showBatchPerm(){
  const sel=Object.entries(userSel).filter(([,v])=>v).map(([k])=>k);if(!sel.length){toast('请先勾选用户','err');return;}
  const m=document.createElement('div');m.className='mod';m.style.display='flex';m.onclick=function(e){if(e.target===this)this.remove();};
  m.innerHTML=`<div class="mod-p sm"><div class="mod-h"><h3>批量调整角色（REQ-SM-002）</h3><button class="btn btn-gh btn-sm" onclick="this.closest('.mod').remove()">&times;</button></div><div class="mod-b"><p style="margin-bottom:14px;">已选择 <b>${sel.length}</b> 名用户：</p><div style="display:flex;flex-direction:column;gap:8px;">${[{r:'user',t:'用户 — 仅查看'},{r:'lead',t:'项目负责人 — 查看+编辑'},{r:'pmo',t:'PMO — 审批+操作'},{r:'admin',t:'系统管理员 — 全部权限'}].map(x=>`<button class="btn btn-o" style="justify-content:flex-start;padding:12px;" onclick="batchRole('${sel.join(',')}','${x.r}')">${x.t}</button>`).join('')}</div></div></div>`;
  document.body.appendChild(m);
}
function batchRole(uids,r){
  const lb={user:'用户',lead:'项目负责人',pmo:'PMO',admin:'系统管理员'};
  uids.split(',').forEach(uid=>{const u=USER_DATA.find(x=>x.id===uid);if(u){u.role=r;u.rl=lb[r];}});
  document.querySelectorAll('.mod').forEach(m=>m.remove());
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'管理员',a:'调整角色',g:`${uids.split(',').length}名用户`,d:`角色设为"${lb[r]}"`});
  renderUsers(); toast(`角色已调整为"${lb[r]}"`,'ok');
}

/* ═══════════════════════════════════════
   OPERATION LOGS — REQ-SM-003
   ═══════════════════════════════════════ */
function renderLogs(flt){
  const list=flt||LOGS;
  document.getElementById('content').innerHTML=`<div class="ph"><div><h1>操作日志</h1><p class="subt">追溯系统操作记录（REQ-SM-003）</p></div></div><div class="tbl-wrap"><div class="tbl-bar"><div style="display:flex;align-items:center;gap:8px;font-size:13px;">日期筛选：<input type="date" style="padding:6px 10px;border-radius:var(--r);border:1.5px solid var(--bd);font-size:13px;font-family:var(--font);" onchange="filterLogs(this.value)" id="logD"><button class="btn btn-gh btn-sm" onclick="document.getElementById('logD').value='';renderLogs();">清除</button></div></div>${list.length===0?'<div class="empty">暂无操作记录</div>':`<table><thead><tr><th style="width:170px;">时间</th><th style="width:110px;">操作人</th><th style="width:100px;">操作类型</th><th style="width:160px;">目标对象</th><th>详情</th></tr></thead><tbody>${list.map(l=>`<tr><td style="font-size:11px;color:var(--tx3);">${l.t}</td><td>${l.u}</td><td><span class="tag gr">${l.a}</span></td><td>${l.g}</td><td style="font-size:12px;color:var(--tx2);">${l.d}</td></tr>`).join('')}</tbody></table>`}</div>`;
  page='logs';
}
function filterLogs(d){renderLogs(d?LOGS.filter(l=>l.t.startsWith(d)):LOGS);}

/* ═══════════════════════════════════════
   DATA SYNC — REQ-DS-001, DS-002, DS-003
   ═══════════════════════════════════════ */
function doSyncProjects(){
  MERGE.push({id:'m'+Date.now(),no:'PRJ-2026-'+String(MERGE.length+9).padStart(3,'0'),name:'新同步项目_'+(MERGE.length+1),type:'setup',src:'飞书立项流程（手动触发）',dt:new Date().toISOString().replace('T',' ').substring(0,16),f:{name:'新同步项目_'+(MERGE.length+1),no:'PRJ-2026-'+String(MERGE.length+9).padStart(3,'0'),type:'external',product:'产品A',leader:'p1',desc:'模拟触发式同步。',status:'draft'}});
  LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'系统管理员',a:'手动同步',g:'飞书项目',d:'触发飞书项目同步（REQ-DS-002）'});updateBadges();toast('已从飞书同步项目到待合并清单','ok');if(page==='merge')renderMerge();
}
function doSyncPeople(){LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'系统管理员',a:'人员同步',g:'全公司',d:'从人事系统同步人员信息（REQ-DS-001）'});toast('人员信息已同步（模拟）','ok');}
function doPushOutput(){LOGS.unshift({t:new Date().toISOString().replace('T',' ').substring(0,16),u:'系统管理员',a:'推送输出',g:'费控/禅道',d:'推送至费控系统、禅道（REQ-DS-003）'});toast('已推送至费控系统、禅道（模拟）','ok');}

/* ═══════════════════════════════════════
   UTILS
   ═══════════════════════════════════════ */
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'inf');t.style.display='block';clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.display='none',3000);}
function updateBadges(){const mb=document.getElementById('badgeMerge');if(mb){mb.textContent=MERGE.length;mb.style.display=MERGE.length>0?'':'none';}const ab=document.getElementById('badgeAppr');if(ab){const n=APPR.filter(a=>a.st==='pending').length;ab.textContent=n;ab.style.display=n>0?'':'none';}}
</script>
</body>
